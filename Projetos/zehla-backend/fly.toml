# fly.toml — ZEHLA PRIME SB30
app = "zehla-crm"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
  APP_NAME = "ZEHLA SmartHotel"
  APP_VERSION = "2.5.0"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
