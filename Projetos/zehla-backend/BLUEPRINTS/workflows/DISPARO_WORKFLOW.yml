name: DISPARO_WORKFLOW

on:
  workflow_dispatch:
    inputs:
      leads_json:
        description: 'JSON Array dos leads brutos para a esteira de Warm-up'
        required: true
        type: string

jobs:
  ingest:
    name: Executar Disparo
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: 🛠️ Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Run Warm-up Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
          NODE_ENV: production
        run: |
          echo '${{ github.event.inputs.leads_json }}' > leads_to_process.json
          pnpm tsx src/lib/delivery/trigger-warmup.ts leads_to_process.json
