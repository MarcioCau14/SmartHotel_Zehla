global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'zehla-production'
    replica: '{{.ExternalURL}}'

scrape_configs:
  # Next.js API
  - job_name: 'zehla-api'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Guardian Worker (if running in its own container or process, update target accordingly)
  # - job_name: 'guardian-worker'
  #   static_configs:
  #     - targets: ['host.docker.internal:9091']
  #   scrape_interval: 10s
  #   scrape_timeout: 5s
