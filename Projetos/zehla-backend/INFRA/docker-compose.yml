version: "3.9"

services:
  # --- REDIS STACK (ALTA DISPONIBILIDADE) ---
  redis-master:
    image: redis:7-alpine
    container_name: zehla-redis-master
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_master_data:/data
    restart: always

  redis-replica-1:
    image: redis:7-alpine
    container_name: zehla-redis-replica-1
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always

  redis-replica-2:
    image: redis:7-alpine
    container_name: zehla-redis-replica-2
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always

  # --- APLICAÇÃO & WORKERS (ENTRYPOINTS ISOLADOS) ---
  zehla-api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: zehla-api
    command: npm run start
    ports:
      - "3001:3000"
    environment:
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      redis-master:
        condition: service_healthy
    restart: on-failure

  decision-worker:
    build: .
    container_name: zehla-decision-worker
    command: node dist/workers/decision.js
    environment:
      - REDIS_HOST=redis-master
      - NODE_ENV=production
    depends_on:
      redis-master:
        condition: service_healthy
    restart: always

  marketing-worker:
    build: .
    container_name: zehla-marketing-worker
    command: node dist/workers/marketing.js
    environment:
      - REDIS_HOST=redis-master
      - NODE_ENV=production
    depends_on:
      redis-master:
        condition: service_healthy
    restart: always

  delivery-worker:
    build: .
    container_name: zehla-delivery-worker
    command: node dist/workers/delivery.js
    environment:
      - REDIS_HOST=redis-master
      - NODE_ENV=production
    depends_on:
      redis-master:
        condition: service_healthy
    restart: always

volumes:
  redis_master_data:
