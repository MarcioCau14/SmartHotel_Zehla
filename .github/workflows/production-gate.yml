# ═══════════════════════════════════════════════════════════════
# SEU ZÉLLA — Production Gate CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════
# Gatekeeper: Nenhum deploy passa sem lint + typecheck + build
# Roda em todo push e pull_request para a branch main
# ═══════════════════════════════════════════════════════════════

name: Production Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: production-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  DATABASE_URL: file:./dev.db

jobs:
  # ── Job 1: Quality Gate ──────────────────────────────────────
  quality-gate:
    name: "🔍 Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4

      - name: "🥟 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "📦 Instalar dependências (frozen lockfile)"
        run: bun install --frozen-lockfile

      - name: "🗄️ Validar schema Prisma"
        run: bunx prisma validate

      - name: "⚙️ Gerar Prisma Client"
        run: bunx prisma generate

      - name: "🧹 Linting rigoroso (src/ apenas)"
        run: |
          echo "── Lint: Verificando erros em código de produção ──"
          # Run lint and check for errors in src/ only
          bun run lint 2>&1 | tee lint-output.txt
          # Count errors specifically in src/ directory
          SRC_ERRORS=$(grep -E "^/home/.*src/.*error" lint-output.txt | wc -l || true)
          if [ "$SRC_ERRORS" -gt 0 ]; then
            echo "❌ $SRC_ERRORS lint errors found in src/"
            exit 1
          fi
          echo "✅ Zero lint errors in src/"

      - name: "🔷 TypeChecking rigoroso"
        run: |
          echo "── TypeScript: Verificação de tipos ──"
          bun run typecheck

  # ── Job 2: Build Gate ────────────────────────────────────────
  build-gate:
    name: "🏗️ Build Gate"
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4

      - name: "🥟 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "📦 Instalar dependências"
        run: bun install --frozen-lockfile

      - name: "🗄️ Gerar Prisma Client"
        run: bunx prisma generate

      - name: "🏗️ Build de Produção"
        run: bun run build
        env:
          NEXTAUTH_SECRET: ci-build-secret-not-for-production
          DATABASE_URL: file:./dev.db
          NEXT_TELEMETRY_DISABLED: 1

  # ── Job 3: Security Gate ─────────────────────────────────────
  security-gate:
    name: "🔒 Security Gate"
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4

      - name: "🥟 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "📦 Instalar dependências"
        run: bun install --frozen-lockfile

      - name: "🔐 Verificar secrets hardcoded"
        run: |
          echo "── Security: Verificando vazamento de secrets ──"
          # Check for hardcoded secrets (excluding known safe patterns)
          SECRET_PATTERN="(sk_live|sk_test|pk_live|AKIA|AIza|ghp_|gho_|xoxb-|xoxp-|-----BEGIN RSA PRIVATE KEY-----)"
          FOUND=$(grep -rnE "$SECRET_PATTERN" src/ --include="*.ts" --include="*.tsx" | grep -v "placeholder" | grep -v "example" | grep -v "mock" | grep -v "// \|/* " || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Possível secret hardcoded encontrado:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ Nenhum secret hardcoded detectado"

      - name: "🛡️ Verificar proteção de rotas ZCC"
        run: |
          echo "── Security: Verificando proteção de rotas ZCC ──"
          # Check that all ZCC routes import verifyZCCAccessOrReject
          UNPROTECTED=""
          for file in $(find src/app/api/zcc -name "route.ts" -type f); do
            if ! grep -q "verifyZCCAccessOrReject\|getServerSession\|ZCC_MASTER_KEY" "$file"; then
              UNPROTECTED="$UNPROTECTED $file"
            fi
          done
          if [ -n "$UNPROTECTED" ]; then
            echo "⚠️ Rotas ZCC sem proteção detectada:$UNPROTECTED"
            echo "Estas rotas devem adicionar verifyZCCAccessOrReject()"
            exit 1
          fi
          echo "✅ Todas as rotas ZCC possuem proteção de acesso"

      - name: "📋 Verificar NEXTAUTH_SECRET sem fallback inseguro"
        run: |
          echo "── Security: Verificando NEXTAUTH_SECRET ──"
          if grep -rn "NEXTAUTH_SECRET.*||.*['\"]" src/ --include="*.ts" | grep -v "dev-secret" | grep -v "NOT.*production" | grep -v "throw"; then
            echo "❌ NEXTAUTH_SECRET com fallback inseguro detectado"
            exit 1
          fi
          echo "✅ NEXTAUTH_SECRET sem fallbacks inseguros"

  # ── Summary ──────────────────────────────────────────────────
  pipeline-status:
    name: "✅ Pipeline Status"
    runs-on: ubuntu-latest
    needs: [quality-gate, build-gate, security-gate]
    if: always()

    steps:
      - name: "📊 Pipeline Result"
        run: |
          echo "════════════════════════════════════════"
          echo "  SEU ZÉLLA — Production Gate Result"
          echo "════════════════════════════════════════"
          echo ""
          echo "  Quality Gate:  ${{ needs.quality-gate.result }}"
          echo "  Build Gate:    ${{ needs.build-gate.result }}"
          echo "  Security Gate: ${{ needs.security-gate.result }}"
          echo ""

          if [[ "${{ needs.quality-gate.result }}" == "success" && \
                "${{ needs.build-gate.result }}" == "success" && \
                "${{ needs.security-gate.result }}" == "success" ]]; then
            echo "  🟢 ALL GATES PASSED — Ready for deploy"
            exit 0
          else
            echo "  🔴 GATE FAILED — Deploy blocked"
            exit 1
          fi
