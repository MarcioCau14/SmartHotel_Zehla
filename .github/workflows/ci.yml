name: Zélla — CI Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./ci-test.db"
      ZCC_MASTER_KEY: "ci-test-master-key-2026"
      ZCC_ADMIN_EMAILS: "admin@zella.com,dev@zella.com"
      NEXTAUTH_SECRET: "ci-nextauth-secret-for-testing"
      NEXTAUTH_URL: "http://localhost:3000"
      BYPASS_MIDDLEWARE_AUTH: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Database Schema Validate
        run: bunx prisma validate

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Push Database Schema
        run: bunx prisma db push --accept-data-loss

      - name: Static Analysis (Linting)
        run: bun run lint

      - name: Typecheck Validation
        run: bun run typecheck

      - name: Execute Test Suite
        run: bun run test

      - name: Production Build Verification
        run: bun run build
        env:
          DATABASE_URL: "file:./ci-build.db"
