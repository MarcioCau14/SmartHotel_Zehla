name: ZEHLA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: secretaria-ai/package-lock.json

    - name: Install dependencies
      run: |
        cd secretaria-ai
        npm ci

    - name: Generate Prisma Client
      run: |
        cd secretaria-ai
        npx prisma generate
      env:
        DATABASE_URL: "file:./db/test.db"

    - name: Run CI check (Lint, Typecheck, Test)
      run: |
        cd secretaria-ai
        npm run ci
      env:
        DATABASE_URL: "file:./db/test.db"
        NEXTAUTH_SECRET: "ci-secret-safe-and-secure"
        NEXTAUTH_URL: "http://localhost:3000"
