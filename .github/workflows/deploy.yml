name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Update Vercel Project Root Directory
        run: |
          TOKEN=${{ secrets.VERCEL_TOKEN }}
          ORG_ID="team_VR8u02Qpy1fEz6hfWuvNYAWv"
          PROJECT_ID="prj_VVHW7kbyEyIEoRf3Orx01GyzGmk1"
          
          # Update the project's root directory to empty (project root)
          curl -s -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v9/projects/$PROJECT_ID?teamId=$ORG_ID" \
            -d '{"rootDirectory": null}' 2>/dev/null | head -5

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_VR8u02Qpy1fEz6hfWuvNYAWv
          VERCEL_PROJECT_ID: prj_VVHW7kbyEyIEoRf3Orx01GyzGmk1
