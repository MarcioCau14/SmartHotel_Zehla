name: ZEHLA Browser Executor (Safari)

on:
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Nome da receita a executar (sem .ts)'
        required: true
        default: 'google-test'
      environment:
        description: 'Ambiente de execução'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  run-automation:
    name: 🚀 Executar Automação
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./zehla-backend

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Install PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: './zehla-backend/pnpm-lock.yaml'

      - name: 🛠️ Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🌐 Install Playwright Webkit
        run: pnpm exec playwright install webkit --with-deps

      - name: ⚡ Run Recipe
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Adicione outros secrets conforme necessário
        run: npx tsx scripts/browser-task.ts ${{ github.event.inputs.recipe }}

      - name: 📸 Upload Artifacts (Screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-results
          path: ./zehla-backend/*.png
          retention-days: 7
