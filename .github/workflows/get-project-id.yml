name: Get Vercel Project ID

on:
  workflow_dispatch:

jobs:
  get-id:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Get Project IDs
        run: |
          echo "=== Using Vercel API ==="
          TOKEN=${{ secrets.VERCEL_TOKEN }}
          ORG_ID="team_VR8u02Qpy1fEz6hfWuvNYAWv"
          
          # List all projects
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects?teamId=$ORG_ID" | python3 -c "
          import sys,json
          data=json.load(sys.stdin)
          projects=data.get('projects',[])
          for p in projects:
            print(f'ID: {p.get(\"id\",\"\")} | Name: {p.get(\"name\",\"\")} | Domain: {p.get(\"targets\",{}).get(\"production\",{}).get(\"alias\",[])}')
          " 2>/dev/null
