name: Find Vercel Project

on:
  workflow_dispatch:

jobs:
  find-project:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: List Projects
        run: |
          echo "=== Listing all Vercel projects ==="
          vercel list --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true
          echo ""
          echo "=== Getting project details ==="
          vercel project ls --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true
