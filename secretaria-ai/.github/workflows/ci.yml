name: ZEHLA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma Client
        run: bunx prisma generate
      - name: Lint
        run: bun run lint
      - name: Run tests (162 tests)
        run: bun run test
      - name: Type check (zero errors required)
        run: |
          ERRORS=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || true)
          echo "Total TypeScript errors: $ERRORS"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::TypeScript has $ERRORS errors"
            npx tsc --noEmit 2>&1 | grep "error TS" | head -20
            exit 1
          fi
