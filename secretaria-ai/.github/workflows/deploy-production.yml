# ==============================================================================  
# ZEHLA SmartHotel — Deploy Production (Mock Mode)  
# ==============================================================================  
# Trigger: Merge em main com tag v*, ou dispatch manual  
# Deploy: Vercel (Production) + Railway (Production)  
# ==============================================================================

name: Deploy Production

on:  
  push:  
    branches: [main]  
    tags: ['v*']  
  workflow_dispatch:  
    inputs:  
      confirm_production:  
        description: "Type 'DEPLOY' to confirm production deploy"  
        required: true  
        type: string  
      skip_tests:  
        description: "Skip CI and deploy directly (emergency only)"  
        required: false  
        default: "false"  
        type: choice  
        options:  
          - "false"  
          - "true"

# Nunca cancelar um deploy de producao em andamento  
concurrency:  
  group: deploy-production  
  cancel-in-progress: false

env:  
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}  
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}  
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}  
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_REALTIME_PROD }}

jobs:  
  # ===========================================================================  
  # CONFIRM: Require manual confirmation for dispatch  
  # ===========================================================================  
  confirm:  
    name: "Production Deploy Confirmation"  
    runs-on: ubuntu-latest  
    if: github.event_name == 'workflow_dispatch'  
    steps:  
      - name: Verify confirmation  
        run: |  
          CONFIRM="${{ github.event.inputs.confirm_production }}"  
          if [ "$CONFIRM" != "DEPLOY" ]; then  
            echo "::error::Please type 'DEPLOY' to confirm production deployment"  
            exit 1  
          fi  
          echo "Production deploy confirmed by @${{ github.actor }}"

  # ===========================================================================  
  # PRE-DEPLOY: Full CI checks  
  # ===========================================================================  
  pre-deploy:  
    name: "Pre-Deploy CI Checks"  
    runs-on: ubuntu-latest  
    needs: [confirm]  
    if: always() && (needs.confirm.result == 'success' || github.event_name != 'workflow_dispatch')  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4

      - name: Setup Bun  
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies  
        run: bun install --frozen-lockfile

      - name: Lint  
        run: bun run lint

      - name: Prisma Generate  
        run: bunx prisma generate

      - name: Prisma Validate  
        run: bunx prisma validate

      - name: Build  
        run: bun run build  
        env:  
          DATABASE_URL: "file:./db/prod-build.db"  
          NEXTAUTH_URL: "https://zehla.com.br"  
          NEXTAUTH_SECRET: "production-build-secret"

  # ===========================================================================  
  # DEPLOY: Vercel Production  
  # ===========================================================================  
  deploy-vercel:  
    name: "Deploy to Vercel (Production)"  
    runs-on: ubuntu-latest  
    needs: [pre-deploy]  
    if: always() && needs.pre-deploy.result == 'success'  
    environment: production  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4

      - name: Install Vercel CLI  
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment  
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}  
        env:  
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}  
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}

      - name: Build with Vercel  
        run: vercel build --yes --target=production --token=${{ secrets.VERCEL_TOKEN }}  
        env:  
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}  
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}

      - name: Deploy to Vercel Production  
        run: vercel deploy --yes --target=production --token=${{ secrets.VERCEL_TOKEN }}  
        id: vercel-deploy  
        env:  
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}  
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}

      - name: Extract Production URL  
        id: url  
        run: echo "url=${{ steps.vercel-deploy.outputs.url }}" >> $GITHUB_OUTPUT

      - name: Post-Deploy Validation  
        run: |  
          URL="${{ steps.url.outputs.url }}"  
          echo "Production URL: $URL"

          echo "Waiting 20s for production propagation..."  
          sleep 20

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")  
          echo "Health: $HEALTH"

          LANDING=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")  
          echo "Landing: $LANDING"

          READINESS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/readiness")  
          echo "Readiness: $READINESS"

          if [ "$HEALTH" != "200" ]; then  
            echo "::error::Production health check failed: $HEALTH"  
            exit 1  
          fi

          echo "========================================="  
          echo "  PRODUCTION DEPLOY: SUCCESS"  
          echo "  URL: $URL"  
          echo "========================================="

      - name: Production Deploy Summary  
        if: always()  
        run: |  
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY  
          echo "" >> $GITHUB_STEP_SUMMARY  
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY  
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY  
          echo "| **Branch** | \\`${{ github.ref_name }}\\` |" >> $GITHUB_STEP_SUMMARY  
          echo "| **Tag** | \\`${{ github.ref_name }}\\` |" >> $GITHUB_STEP_SUMMARY  
          echo "| **Commit** | \\`${{ github.sha }}\\` |" >> $GITHUB_STEP_SUMMARY  
          echo "| **URL** | ${{ steps.url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY  
          echo "| **Deployer** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY  
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY  
          echo "" >> $GITHUB_STEP_SUMMARY  
          echo "> **Next:** Update DNS to point to this URL, configure SSL, and run the validation checklist" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================  
  # DEPLOY: Railway Production  
  # ===========================================================================  
  deploy-railway:  
    name: "Deploy to Railway (Production Realtime)"  
    runs-on: ubuntu-latest  
    needs: [pre-deploy]  
    if: always() && needs.pre-deploy.result == 'success'  
    environment: production  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4

      - name: Install Railway CLI  
        run: npm install -g @railway/cli

      - name: Deploy Realtime Service  
        run: |  
          cd mini-services/realtime-service  
          railway up --service="${{ secrets.RAILWAY_SERVICE_ID_REALTIME_PROD }}" --environment=production 2>&1 || echo "::warning::Railway deploy requires RAILWAY_TOKEN and RAILWAY_SERVICE_ID_REALTIME_PROD secrets"  
        env:  
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}  
        continue-on-error: true

  # ===========================================================================  
  # POST-DEPLOY: Notification  
  # ===========================================================================  
  post-deploy:  
    name: "Post-Deploy Notification"  
    runs-on: ubuntu-latest  
    if: always()  
    needs: [deploy-vercel, deploy-railway]  
    steps:  
      - name: Deployment Result  
        run: |  
          echo "========================================="  
          echo "  ZEHLA SmartHotel — Production Deploy"  
          echo "========================================="  
          echo "  Vercel:  ${{ needs.deploy-vercel.result }}"  
          echo "  Railway: ${{ needs.deploy-railway.result }}"  
          echo "  Status:  ${{ needs.deploy-vercel.result == 'success' && 'SUCCESS' || 'FAILED' }}"  
          echo "========================================="

      - name: Create GitHub Deployment  
        uses: chrnorm/deployment-action@v2  
        if: needs.deploy-vercel.result == 'success'  
        with:  
          token: ${{ secrets.GITHUB_TOKEN }}  
          environment_url: "https://zehla.com.br"  
          environment: production  
          description: "ZEHLA SmartHotel production deployment"

      - name: Update Deployment Status  
        uses: chrnorm/deployment-status@v2  
        if: needs.deploy-vercel.result == 'success'  
        with:  
          token: ${{ secrets.GITHUB_TOKEN }}  
          environment_url: "https://zehla.com.br"  
          state: "success"  
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
