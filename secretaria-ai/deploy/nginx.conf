# Zélla Nginx Reverse Proxy Config (Hostinger KVM4)

upstream nextjs_upstream {
  server localhost:3000; # Next.js frontend e API REST
}

upstream loopengine_upstream {
  server localhost:8080; # Loop Engine Docker
}

# HTTP to HTTPS Redirect
server {
    listen 80;
    server_name meuzella.com app.meuzella.com api.meuzella.com;
    return 301 https://$host$request_uri;
}

# Principal WebApp e Marketing (Next.js)
server {
    listen 443 ssl http2;
    server_name meuzella.com app.meuzella.com;

    # Certbot SSL (Será injetado pelo certbot)
    ssl_certificate /etc/letsencrypt/live/meuzella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meuzella.com/privkey.pem;

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addres_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API Subdomain
server {
    listen 443 ssl http2;
    server_name api.meuzella.com;

    ssl_certificate /etc/letsencrypt/live/meuzella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meuzella.com/privkey.pem;

    # Rotas da API REST Principal
    location /v1/ {
        proxy_pass http://nextjs_upstream/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addres_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rotas do Loop Engine
    location /loops/ {
        proxy_pass http://loopengine_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
