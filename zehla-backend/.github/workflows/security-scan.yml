name: ZEHLA Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  security-scan:
    name: Dependency & Code Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-security-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-security-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan (truffleHog)
        run: |
          curl -sSfL https://github.com/trufflesecurity/trufflehog/releases/latest/download/trufflehog_linux_amd64.tar.gz | tar xz
          ./trufflehog filesystem --no-verification --fail ./
        continue-on-error: true

      - name: pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run FSA deep review
        run: pnpm fsa:review
        continue-on-error: true
        env:
          NODE_ENV: production

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.sha }}
          path: |
            .fsa-reports/
            pnpm-audit-output.*
          retention-days: 30
          if-no-files-found: warn

      - name: Create issue on critical findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security']
            });
            const exists = issues.some(i =>
              i.title.includes('Security vulnerabilities found')
            );
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Security vulnerabilities found — ${new Date().toISOString().slice(0, 10)}`,
                body: 'Automated security scan detected vulnerabilities. Check the workflow artifacts for details.',
                labels: ['security', 'automated']
              });
            }
