version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zehla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zehla
      POSTGRES_PASSWORD: zehla_secret_2026
      POSTGRES_DB: zehla_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zehla -d zehla_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zehla-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: zehla-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: zehla-evolution-key
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: postgresql://zehla:zehla_secret_2026@postgres:5432/zehla_db?schema=evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
    depends_on:
      - postgres
    volumes:
      - evolution_data:/evolution/instances

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: zehla-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.0
    container_name: zehla-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-zehla_admin_2026}
      GF_INSTALL_PLUGINS: grafana-clock-panel
      GF_SERVER_ROOT_URL: https://zehla.io/grafana
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/guardian-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    profiles:
      - monitoring

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: zehla-headroom
    restart: unless-stopped
    ports:
      - "8787:8787"
      - "8789:8789"
    environment:
      OPENAI_BASE_URL: "https://openrouter.ai/api/v1"
      OPENAI_API_KEY: "${OPENROUTER_API_KEY}"
      HEADROOM_NO_OPTIMIZE: "false"
      HEADROOM_NO_CACHE: "false"
      HEADROOM_NO_INTELLIGENT_CONTEXT: "false"
      HEADROOM_NO_COMPRESS_FIRST: "false"
      HEADROOM_BUDGET: "${HEADROOM_DAILY_BUDGET:-50.0}"
      HEADROOM_TELEMETRY: "off"
      HEADROOM_LOG_FILE: "/var/log/headroom/headroom.jsonl"
      HEADROOM_STORE_MAX_ENTRIES: "2000"
      HEADROOM_STORE_TTL_SECONDS: "7200"
      HEADROOM_LEARN_ENABLED: "true"
    volumes:
      - headroom_data:/root/.headroom
      - headroom_logs:/var/log/headroom
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  prometheus_data:
  grafana_data:
  headroom_data:
  headroom_logs:

