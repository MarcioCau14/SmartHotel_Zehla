<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zehla - Multi-View Analyzer</title>
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: rgba(24, 24, 27, 0.6);
            --border-color: rgba(63, 63, 70, 0.4);
            --accent-color: #f97316; /* Orange Fluorescent */
            --text-color: #fafafa;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.025em;
        }

        .logo span {
            color: var(--accent-color);
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .btn:hover {
            background: rgba(39, 39, 42, 0.8);
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent-color);
            color: #000;
            border: none;
        }

        .btn-primary:hover {
            background: #ea580c;
            color: #000;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 1.5rem;
            flex: 1;
            height: calc(100vh - 70px);
            background: radial-gradient(circle at 50% 50%, #18181b 0%, #09090b 100%);
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(249, 115, 22, 0.15);
            border-color: rgba(249, 115, 22, 0.3);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            background: rgba(24, 24, 27, 0.8);
            border-bottom: 1px solid var(--border-color);
        }

        .panel-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-color);
        }

        .panel-actions {
            display: flex;
            gap: 0.5rem;
        }

        .panel-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.25rem;
            border-radius: 0.25rem;
        }

        .panel-btn:hover {
            color: var(--text-color);
            background: rgba(63, 63, 70, 0.4);
        }

        .iframe-container {
            flex: 1;
            position: relative;
            background: #fff; /* White background for the iframe content to look natural */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid-container {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }
            .panel {
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            ZEHLA <span>Multi-View</span>
        </div>
        <div class="controls">
            <button class="btn" onclick="refreshAll()">Recarregar Todos</button>
            <button class="btn btn-primary" onclick="openAllSeparate()">Abrir Separados</button>
        </div>
    </header>

    <div class="grid-container">
        <!-- Painel 1: Página de Vendas -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Página de Vendas (/)</div>
                <div class="panel-actions">
                    <button class="panel-btn" onclick="refreshIframe('sales-frame')">🔄</button>
                    <button class="panel-btn" onclick="window.open('/', '_blank')">↗️</button>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="sales-frame" src="/"></iframe>
            </div>
        </div>

        <!-- Painel 2: ZCC -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">ZCC Admin (/zcc)</div>
                <div class="panel-actions">
                    <button class="panel-btn" onclick="refreshIframe('zcc-frame')">🔄</button>
                    <button class="panel-btn" onclick="window.open('/zcc', '_blank')">↗️</button>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="zcc-frame" src="/zcc-login"></iframe>
            </div>
        </div>

        <!-- Painel 3: Dashboard do Cliente -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Dashboard (/dashboard)</div>
                <div class="panel-actions">
                    <button class="panel-btn" onclick="refreshIframe('dashboard-frame')">🔄</button>
                    <button class="panel-btn" onclick="window.open('/dashboard', '_blank')">↗️</button>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="dashboard-frame" src="/dashboard"></iframe>
            </div>
        </div>
    </div>

    <script>
        function refreshIframe(id) {
            const iframe = document.getElementById(id);
            iframe.src = iframe.src;
        }

        function refreshAll() {
            refreshIframe('sales-frame');
            refreshIframe('zcc-frame');
            refreshIframe('dashboard-frame');
        }

        function openAllSeparate() {
            window.open('/', '_blank');
            window.open('/zcc', '_blank');
            window.open('/dashboard', '_blank');
        }
    </script>
</body>
</html>
