# ==============================================================================
# SEU ZELLA — Nginx Reverse Proxy Configuration
# ==============================================================================
# Domínio: seuzella.com | Upstream: Docker container na porta 3000
# Deploy: copiar para /etc/nginx/sites-available/seuzella.conf
#         ln -s /etc/nginx/sites-available/seuzella.conf /etc/nginx/sites-enabled/
#         nginx -t && systemctl reload nginx
# ==============================================================================

# ── Upstream (Container Docker) ───────────────────────────────────────────────
upstream seuzella_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── Rate Limiting Zones ───────────────────────────────────────────────────────
# Zona global: 10 req/s por IP
limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;

# Zona de autenticação: 3 req/s por IP (login/register)
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

# Zona de webhook: 30 req/s por IP (WhatsApp Evolution API dispara webhooks)
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

# Zona de API: 5 req/s por IP (endpoints gerais)
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

# ── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name seuzella.com www.seuzella.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (Produção) ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name seuzella.com www.seuzella.com;

    # ── Certificados SSL (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/seuzella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seuzella.com/privkey.pem;

    # ── SSL Hardening (Mozilla Intermediate) ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── HSTS (6 meses) ──
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # ── Security Headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.mercadopago.com https://api.openai.com https://api.groq.com wss://seuzella.com; frame-ancestors 'none'; form-action 'self' https://*.mercadopago.com; base-uri 'self';" always;

    # ── Logs ──
    access_log /var/log/nginx/seuzella-access.log;
    error_log  /var/log/nginx/seuzella-error.log;

    # ── Tamanho máximo de upload ──
    client_max_body_size 10M;

    # ── Timeout ──
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Webhook do WhatsApp (rota pública, alta taxa permitida) ──
    location /api/webhook-whatsapp {
        limit_req zone=webhook burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Checkout Webhook (MercadoPago) ──
    location /api/checkout/webhook {
        limit_req zone=webhook burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Autenticação (login/register — anti-brute-force) ──
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── API geral (autenticada) ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Páginas Next.js (SSR/SSG) ──
    location / {
        limit_req zone=global burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Arquivos estáticos (cache agressivo) ──
    location /_next/static/ {
        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Imagens e assets públicos ──
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2|woff|ttf|eot)$ {
        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Bloquear acesso a arquivos sensíveis ──
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location ~ \.(env|git|md|log|sql|db)$ {
        deny all;
        return 404;
    }

    # ── Health check (para monitoramento externo) ──
    location /api/health {
        proxy_pass http://seuzella_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }
}
